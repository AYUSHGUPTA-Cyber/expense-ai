<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f1f5f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.register-box {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    text-align: center;
}

/* Logo */
.logo {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 10px;
}

/* Title */
h2 {
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #1a73e8;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

/* Link */
a {
    display: block;
    margin-top: 15px;
    font-size: 13px;
    color: #1a73e8;
    text-decoration: none;
}

/* Hover */
button:hover {
    background: #1669c1;
}
</style>
</head>

<body>

<div class="register-box">

    <div class="logo">🚀 Expense AI</div>
    <h2>Create Account</h2>

    <form method="POST">
        <input name="username" placeholder="Email or Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <a href="/login">Already have an account? Sign in</a>

</div>

</body>
</html>
